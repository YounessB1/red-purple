services:

  agent-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ..:/app/source:ro
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ../../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
